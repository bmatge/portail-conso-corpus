server {
    listen 80;
    server_name _;

    # --- Redirections relatives pour fonctionner derrière Traefik HTTPS ---
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # --- Cache assets statiques ---
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # --- Page principale ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API backend (FastAPI sur port 8000) ---
    location /api/ {
        # Preflight CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;

        # SSE support — disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        # CORS sur les réponses
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
    }

    # --- Proxy CORS dynamique (remplace serve.py) ---
    # Usage : /proxy-https/albert.api.etalab.gouv.fr/v1/chat/completions
    # Format : /proxy-{scheme}/{host}/{path} — avoids :// which Traefik merges
    location ~ ^/proxy-(https?)/(.+)$ {
        # Résolution DNS dynamique obligatoire pour proxy_pass variable
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # Preflight CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, x-api-key, anthropic-version, anthropic-dangerous-direct-browser-access' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }

        # Reconstituer l'URL cible : scheme://rest
        proxy_pass $1://$2;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;

        # CORS sur les réponses
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, x-api-key, anthropic-version, anthropic-dangerous-direct-browser-access' always;

        # Timeouts pour les API LLM (réponses parfois longues)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # --- Sécurité ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
